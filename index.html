<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MeetRecord</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#202124;--bg2:#2d2e30;--bg3:#3c3d3f;--tile:#1e1e1e;
  --blue:#8ab4f8;--green:#81c995;--red:#f28b82;--yellow:#fdd663;--purple:#c58af9;
  --tx:#e8eaed;--tx2:#9aa0a6;--border:rgba(255,255,255,0.08);
  --shadow:0 4px 24px rgba(0,0,0,0.4);--r:12px;
  --font:'Google Sans','Roboto',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── SHARED ── */
.btn{width:100%;padding:11px;border-radius:8px;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:#1a73e8;color:#fff}.btn-primary:hover{background:#1557b0}
.btn-secondary{background:transparent;color:var(--blue);border:1px solid rgba(138,180,248,.3);margin-top:8px}.btn-secondary:hover{background:rgba(138,180,248,.08)}
.divider{display:flex;align-items:center;gap:12px;margin:12px 0;color:var(--tx2);font-size:12px}.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
input[type=text],select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--tx);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s}
input[type=text]:focus,select:focus{border-color:var(--blue)}
select option{background:var(--bg3)}
.lbl{font-size:11px;color:var(--tx2);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;display:block}
.preview-box{background:#000;border-radius:12px;height:160px;margin-bottom:16px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.preview-box video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.no-cam{display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--tx2);font-size:13px}
.av-circle{width:48px;height:48px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:500}
.ig{display:flex;flex-direction:column;gap:10px;margin-bottom:13px}

/* ── LOBBY (host) ── */
#lobby{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow-y:auto;padding:20px 0}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.logo svg{width:34px;height:34px}
.logo span{font-size:24px;font-weight:400;letter-spacing:-.5px}
.tagline{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
