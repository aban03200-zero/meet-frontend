<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meet Clone</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #202124;
    --bg-secondary: #2d2e30;
    --bg-tertiary: #3c3d3f;
    --bg-tile: #1e1e1e;
    --accent: #8ab4f8;
    --accent-green: #81c995;
    --accent-red: #f28b82;
    --accent-yellow: #fdd663;
    --text-primary: #e8eaed;
    --text-secondary: #9aa0a6;
    --border: rgba(255,255,255,0.08);
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --radius: 12px;
    --font-main: 'Google Sans', 'Roboto', sans-serif;
  }

  body {
    font-family: var(--font-main);
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── LOBBY ─── */
  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 0;
    background: var(--bg-primary);
  }

  .lobby-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 40px;
  }

  .lobby-logo svg { width: 40px; height: 40px; }

  .lobby-logo span {
    font-size: 28px;
    font-weight: 400;
    color: var(--text-primary);
    letter-spacing: -0.5px;
  }

  .lobby-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 48px;
    width: 420px;
    box-shadow: var(--shadow);
  }

  .lobby-card h2 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--text-primary);
  }

  .lobby-card p {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .preview-box {
    background: #000;
    border-radius: 16px;
    height: 200px;
    margin-bottom: 24px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .preview-box video {
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  .preview-box .no-cam {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
    font-size: 13px;
  }

  .preview-box .avatar-circle {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: var(--bg-tertiary);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }

  .input-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text-primary);
    font-family: var(--font-main);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 13px;
    border-radius: 8px;
    font-family: var(--font-main);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }

  .btn-primary {
    background: #1a73e8;
    color: #fff;
  }
  .btn-primary:hover { background: #1557b0; }
  .btn-primary:active { transform: scale(0.98); }

  .btn-secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid rgba(138, 180, 248, 0.3);
    margin-top: 8px;
  }
  .btn-secondary:hover { background: rgba(138, 180, 248, 0.08); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
    color: var(--text-secondary);
    font-size: 13px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ─── MAIN LAYOUT ─── */
  #app {
    display: none;
    flex-direction: column;
    height: 100vh;
    background: var(--bg-primary);
  }

  /* ─── HEADER ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .room-info {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .room-id-badge {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 14px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .room-id-badge:hover { background: var(--bg-tertiary); color: var(--text-primary); }
  .room-id-badge .room-code { color: var(--text-primary); font-weight: 500; }

  .header-time {
    font-size: 14px;
    color: var(--text-secondary);
  }

  /* ─── VIDEO GRID ─── */
  .main-area {
    flex: 1;
    display: flex;
    overflow: hidden;
    gap: 8px;
    padding: 0 16px;
  }

  #videoGrid {
    flex: 1;
    display: grid;
    gap: 8px;
    align-content: center;
    justify-content: center;
    overflow: hidden;
    padding: 8px 0;
  }

  /* Grid layout based on participant count */
  #videoGrid.count-1 { grid-template-columns: minmax(0, 900px); }
  #videoGrid.count-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  #videoGrid.count-3 { grid-template-columns: repeat(2, minmax(0, 1fr)); grid-template-rows: repeat(2, 1fr); }
  #videoGrid.count-3 .video-tile:first-child { grid-column: 1 / -1; }
  #videoGrid.count-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  #videoGrid.count-5, #videoGrid.count-6 { grid-template-columns: repeat(3, minmax(0, 1fr)); }

  .video-tile {
    background: var(--bg-tile);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    aspect-ratio: 16/9;
    min-height: 0;
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }

  .video-tile.speaking { border-color: #00c853; }

  .video-tile video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .video-tile.local video { transform: scaleX(-1); }

  .tile-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 12px 14px 10px;
    background: linear-gradient(transparent, rgba(0,0,0,0.65));
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .tile-name {
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .muted-icon {
    display: none;
    background: rgba(234, 67, 53, 0.9);
    border-radius: 50%;
    padding: 3px;
    width: 20px; height: 20px;
    align-items: center; justify-content: center;
  }

  .muted-icon.visible { display: flex; }

  .tile-avatar {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-tertiary);
  }

  .tile-avatar-inner {
    width: 80px; height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 500;
    background: #5f6368;
    color: #fff;
    transition: opacity 0.3s;
  }

  /* ─── CHAT PANEL ─── */
  #chatPanel {
    width: 300px;
    background: var(--bg-secondary);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: none;
    flex-direction: column;
    margin: 0 0 8px;
    overflow: hidden;
  }

  #chatPanel.open { display: flex; }

  .chat-header {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 15px;
    font-weight: 500;
  }

  .chat-close {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 4px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .chat-close:hover { background: var(--bg-tertiary); }

  #chatMessages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--bg-tertiary) transparent;
  }

  .chat-msg {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .chat-msg-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .chat-msg-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
  }

  .chat-msg-time {
    font-size: 11px;
    color: var(--text-secondary);
  }

  .chat-msg-body {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.45;
    word-break: break-word;
  }

  .chat-input-area {
    padding: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .chat-input-area input {
    flex: 1;
    background: var(--bg-tertiary);
    border-radius: 24px;
    padding: 10px 14px;
    font-size: 14px;
    border: none;
  }

  .chat-send {
    background: #1a73e8;
    border: none;
    border-radius: 50%;
    width: 36px; height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .chat-send:hover { background: #1557b0; }
  .chat-send svg { width: 18px; height: 18px; fill: #fff; }

  /* ─── CONTROLS BAR ─── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px 20px;
    flex-shrink: 0;
  }

  .controls-left {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 200px;
  }

  .controls-center {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .controls-right {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 200px;
    justify-content: flex-end;
  }

  .ctrl-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-secondary);
    padding: 0;
    font-family: var(--font-main);
  }

  .ctrl-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--bg-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    border: 1px solid var(--border);
  }

  .ctrl-btn:hover .ctrl-icon { background: var(--bg-tertiary); }

  .ctrl-btn.active .ctrl-icon {
    background: #3c4043;
  }

  .ctrl-btn.off .ctrl-icon {
    background: rgba(234, 67, 53, 0.15);
    border-color: rgba(234, 67, 53, 0.3);
  }

  .ctrl-btn.off svg { color: var(--accent-red) !important; }

  .ctrl-label {
    font-size: 11px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  .ctrl-btn svg { color: var(--text-primary); }

  .end-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-secondary);
    padding: 0;
    font-family: var(--font-main);
    position: relative;
  }
  .end-btn .ctrl-icon {
    background: #ea4335 !important;
    border-color: transparent !important;
  }
  .end-btn:hover .ctrl-icon { background: #c5221f !important; }

  /* ─── NOTIFICATION TOAST ─── */
  #toast {
    position: fixed;
    bottom: 100px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    color: var(--text-primary);
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s;
    z-index: 100;
    white-space: nowrap;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── PARTICIPANT BADGE ─── */
  .participant-count {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .participant-count svg { width: 14px; height: 14px; }

  /* ─── CHAT BADGE ─── */
  .chat-badge {
    position: absolute;
    top: -2px; right: -2px;
    background: var(--accent-red);
    border-radius: 50%;
    width: 16px; height: 16px;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    display: none;
  }

  .ctrl-btn { position: relative; }

  /* ─── SCREEN SHARE INDICATOR ─── */
  .screen-share-banner {
    background: rgba(26, 115, 232, 0.15);
    border: 1px solid rgba(26, 115, 232, 0.3);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--accent);
    display: none;
    align-items: center;
    gap: 8px;
  }

  .screen-share-banner.active { display: flex; }

  /* ── 필름스트립 사이드 패널 ── */
  #filmstrip {
    width: 160px;
    display: none;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
    padding: 4px 0;
    flex-shrink: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--bg-tertiary) transparent;
  }
  #filmstrip.open { display: flex; }

  .fs-tile {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--bg-tile);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .fs-tile:hover { border-color: rgba(138,180,248,0.4); }
  .fs-tile video { width:100%; height:100%; object-fit:cover; }
  .fs-tile.local video { transform: scaleX(-1); }
  .fs-tile-name {
    position: absolute; bottom:0; left:0; right:0;
    padding: 4px 6px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    font-size: 10px; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .fs-tile-avatar {
    position: absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background: var(--bg-tertiary);
    font-size:18px; font-weight:500; color:#fff;
  }

  /* ── 참가자 패널 ── */
  #participantsPanel {
    width: 260px;
    background: var(--bg-secondary);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: none;
    flex-direction: column;
    margin: 0 0 8px;
    overflow: hidden;
    flex-shrink: 0;
  }
  #participantsPanel.open { display: flex; }

  .pp-header {
    padding: 15px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 15px; font-weight: 500;
  }

  #participantsList {
    flex: 1; overflow-y: auto; padding: 8px;
    scrollbar-width: thin; scrollbar-color: var(--bg-tertiary) transparent;
  }

  .pp-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
    transition: background 0.15s;
  }
  .pp-item:hover { background: var(--bg-tertiary); }

  .pp-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: #5f6368;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 500; color: #fff;
    flex-shrink: 0;
  }

  .pp-info { flex: 1; min-width: 0; }
  .pp-name { font-size: 14px; color: var(--text-primary); }
  .pp-status { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

  .pp-icons { display: flex; gap: 4px; }
  .pp-icon {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .pp-icon.muted { background: rgba(234,67,53,0.15); }
  .pp-icon.muted svg { stroke: var(--accent-red); }

  /* ── 가상 배경 패널 ── */
  #bgPanel {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    width: 320px;
    z-index: 200;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #bgPanel.open { display: block; }

  .bg-panel-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 14px;
  }

  .bg-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }

  .bg-option {
    aspect-ratio: 16/10;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    overflow: hidden;
    position: relative;
    transition: border-color 0.15s;
    background: var(--bg-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
  }

  .bg-option:hover { border-color: rgba(138,180,248,0.4); }
  .bg-option.selected { border-color: var(--accent); }

  .bg-option img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .bg-option-label {
    position: absolute;
    bottom: 4px;
    left: 0; right: 0;
    text-align: center;
    font-size: 10px;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  .bg-upload-btn {
    width: 100%;
    padding: 9px;
    background: var(--bg-tertiary);
    border: 1px dashed rgba(255,255,255,0.2);
    border-radius: 8px;
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    font-family: var(--font-main);
    transition: background 0.15s;
  }
  .bg-upload-btn:hover { background: rgba(255,255,255,0.06); }

  #bgFileInput { display: none; }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }

  .video-tile { animation: fadeIn 0.25s ease; }
</style>
</head>
<body>

<!-- ─── LOBBY ─── -->
<div id="lobby">
  <div class="lobby-logo">
    <!-- Google Meet style icon -->
    <svg viewBox="0 0 40 40" fill="none">
      <rect width="40" height="40" rx="8" fill="#00897B"/>
      <path d="M8 14h16v12H8z" fill="white" rx="2"/>
      <path d="M28 16l8-4v16l-8-4V16z" fill="white"/>
    </svg>
    <span>Meet</span>
  </div>

  <div class="lobby-card">
    <h2>화상 회의 시작</h2>
    <p>새 회의를 만들거나 초대 코드로 참가하세요</p>

    <div class="preview-box">
      <video id="previewVideo" autoplay muted playsinline></video>
      <div class="no-cam" id="noCamMsg">
        <div class="avatar-circle" id="lobbyAvatar">?</div>
        <span>카메라 없음</span>
      </div>
    </div>

    <div class="input-group">
      <div>
        <div class="input-label">이름</div>
        <input type="text" id="usernameInput" placeholder="이름을 입력하세요" maxlength="20" />
      </div>
    </div>

    <button class="btn btn-primary" onclick="createRoom()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" style="vertical-align:middle; margin-right:6px; margin-bottom:2px;">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>새 회의 만들기
    </button>

    <div class="divider">또는</div>

    <div class="input-group">

<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  ⚙️  여기만 수정하면 됩니다!                             ║
// ║  Railway 배포 후 생성된 URL을 아래에 붙여넣으세요        ║
// ║  예시: "https://meet-server-production.up.railway.app"   ║
// ╚══════════════════════════════════════════════════════════╝
const RAILWAY_SERVER_URL = "https://inout-meet.up.railway.app";

// ──────────────────────────────────────────
// STATE
// ──────────────────────────────────────────
const state = {
  socket: null,
  roomId: null,
  username: null,
  localStream: null,
  screenStream: null,
  peers: new Map(),
  peerUsernames: new Map(),
  micEnabled: true,
  camEnabled: true,
  screenSharing: false,
  chatOpen: false,
  unreadChat: 0,
  startTime: null,
};

// ──────────────────────────────────────────
// 가상 배경 (Virtual Background)
// ──────────────────────────────────────────
const bg = {
  mode: "none",       // "none" | "blur" | "image"
  image: null,        // HTMLImageElement
  canvas: null,
  ctx: null,
  rafId: null,
  canvasStream: null,
};

function toggleBgPanel() {
  document.getElementById("bgPanel").classList.toggle("open");
}

// 패널 바깥 클릭 시 닫기
document.addEventListener("click", e => {
  const panel = document.getElementById("bgPanel");
  const btn = document.getElementById("bgBtn");
  if (panel.classList.contains("open") && !panel.contains(e.target) && !btn.contains(e.target)) {
    panel.classList.remove("open");
  }
});

function onBgImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      bg.image = img;
      document.getElementById("bgThumb").src = ev.target.result;
      document.getElementById("bgOpt-image").style.display = "flex";
      applyBg("image");
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

async function applyBg(mode) {
  bg.mode = mode;

  // 선택 UI 업데이트
  ["none","blur","image"].forEach(m => {
    document.getElementById(`bgOpt-${m}`)?.classList.toggle("selected", m === mode);
  });

  const btn = document.getElementById("bgBtn");
  btn.classList.toggle("active", mode !== "none");

  if (mode === "none") {
    // 캔버스 처리 중단 → 원본 카메라로 복귀
    stopBgProcessing();
    restoreOriginalTrack();
  } else {
    // 캔버스 처리 시작
    await startBgProcessing();
  }
}

async function startBgProcessing() {
  if (!state.localStream) return;
  stopBgProcessing();

  const videoTrack = state.localStream.getVideoTracks()[0];
  if (!videoTrack) return;

  const settings = videoTrack.getSettings();
  const W = settings.width || 640;
  const H = settings.height || 480;

  // 캔버스 설정
  bg.canvas = document.createElement("canvas");
  bg.canvas.width = W;
  bg.canvas.height = H;
  bg.ctx = bg.canvas.getContext("2d");
  bg.tmpCanvas = document.createElement("canvas");
  bg.tmpCanvas.width = W;
  bg.tmpCanvas.height = H;
  bg.tmpCtx = bg.tmpCanvas.getContext("2d");

  // 소스 비디오
  bg.srcVid = document.createElement("video");
  bg.srcVid.srcObject = new MediaStream([videoTrack]);
  bg.srcVid.muted = true;
  await bg.srcVid.play();

  // MediaPipe Selfie Segmentation 초기화
  bg.segmentation = new SelfieSegmentation({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1.1675465747/${f}`
  });
  bg.segmentation.setOptions({ modelSelection: 1, selfieMode: true });

  bg.segmentation.onResults(results => {
    const ctx = bg.ctx;
    const tmp = bg.tmpCtx;
    const W = bg.canvas.width;
    const H = bg.canvas.height;

    ctx.clearRect(0, 0, W, H);

    // ── 1. 배경 그리기 ──
    if (bg.mode === "blur") {
      ctx.filter = "blur(20px)";
      ctx.drawImage(results.image, -30, -30, W + 60, H + 60);
      ctx.filter = "none";
    } else if (bg.mode === "image" && bg.image) {
      ctx.drawImage(bg.image, 0, 0, W, H);
    }

    // ── 2. 마스크로 사람만 오려내기 ──
    tmp.clearRect(0, 0, W, H);
    tmp.drawImage(results.segmentationMask, 0, 0, W, H);
    tmp.globalCompositeOperation = "source-in";
    tmp.drawImage(results.image, 0, 0, W, H);
    tmp.globalCompositeOperation = "source-over";

    // ── 3. 사람을 배경 위에 합성 ──
    ctx.drawImage(bg.tmpCanvas, 0, 0);
  });

  // 프레임 루프
  async function renderFrame() {
    if (!bg.segmentation) return;
    await bg.segmentation.send({ image: bg.srcVid });
    bg.rafId = requestAnimationFrame(renderFrame);
  }

  renderFrame();

  // 캔버스 스트림으로 트랙 교체
  bg.canvasStream = bg.canvas.captureStream(30);
  const newTrack = bg.canvasStream.getVideoTracks()[0];

  const localVid = document.getElementById("vid-local");
  if (localVid) {
    localVid.srcObject = new MediaStream([newTrack, ...state.localStream.getAudioTracks()]);
  }

  state.peers.forEach(pc => {
    const sender = pc.getSenders().find(s => s.track?.kind === "video");
    if (sender) sender.replaceTrack(newTrack).catch(() => {});
  });
}

function stopBgProcessing() {
  if (bg.rafId) { cancelAnimationFrame(bg.rafId); bg.rafId = null; }
  if (bg.segmentation) { bg.segmentation.close(); bg.segmentation = null; }
  bg.canvas = null; bg.ctx = null;
  bg.tmpCanvas = null; bg.tmpCtx = null;
  bg.canvasStream = null;
  if (bg.srcVid) { bg.srcVid.srcObject = null; bg.srcVid = null; }
}

function restoreOriginalTrack() {
  const originalTrack = state.localStream?.getVideoTracks()[0];
  if (!originalTrack) return;
  const localVid = document.getElementById("vid-local");
  if (localVid) localVid.srcObject = state.localStream;
  state.peers.forEach(pc => {
    const sender = pc.getSenders().find(s => s.track?.kind === "video");
    if (sender) sender.replaceTrack(originalTrack).catch(() => {});
  });
}

// ──────────────────────────────────────────
// 필름스트립 (뷰 전환)
// ──────────────────────────────────────────
let filmstripOpen = false;

function toggleFilmstrip() {
  filmstripOpen = !filmstripOpen;
  document.getElementById("filmstrip").classList.toggle("open", filmstripOpen);
  document.getElementById("filmstripBtn").classList.toggle("active", filmstripOpen);
  if (filmstripOpen) rebuildFilmstrip();
}

function rebuildFilmstrip() {
  const fs = document.getElementById("filmstrip");
  fs.innerHTML = "";

  // 메인 그리드의 모든 타일을 미러링
  document.querySelectorAll(".video-tile").forEach(tile => {
    const id = tile.id.replace("tile-", "");
    const srcVid = document.getElementById(`vid-${id}`);
    const nameEl = tile.querySelector(".tile-name");
    const name = nameEl ? nameEl.innerText.trim() : id;

    const fsTile = document.createElement("div");
    fsTile.className = `fs-tile${tile.classList.contains("local") ? " local" : ""}`;
    fsTile.id = `fs-${id}`;

    const avatarEl = document.getElementById(`avatar-${id}`);
    const showAvatar = avatarEl && avatarEl.style.display !== "none"
      ? "" : 'style="display:none"';
    const initial = name ? name[0].toUpperCase() : "?";

    fsTile.innerHTML = `
      <div class="fs-tile-avatar" id="fs-av-${id}" ${showAvatar}>${initial}</div>
      <video id="fs-vid-${id}" autoplay playsinline ${tile.classList.contains("local") ? "muted" : ""}></video>
      <div class="fs-tile-name">${name}</div>
    `;

    if (srcVid?.srcObject) {
      const fsVid = fsTile.querySelector(`#fs-vid-${id}`);
      fsVid.srcObject = srcVid.srcObject;
      fsVid.oncanplay = () => {
        const av = fsTile.querySelector(`#fs-av-${id}`);
        if (av) av.style.display = "none";
      };
    }

    fs.appendChild(fsTile);
  });
}

// ──────────────────────────────────────────
// 참가자 패널
// ──────────────────────────────────────────
let participantsOpen = false;

function toggleParticipants() {
  participantsOpen = !participantsOpen;
  document.getElementById("participantsPanel").classList.toggle("open", participantsOpen);
  document.getElementById("ppBtn").classList.toggle("active", participantsOpen);
  if (participantsOpen) rebuildParticipants();
}

function rebuildParticipants() {
  const list = document.getElementById("participantsList");
  list.innerHTML = "";

  const tiles = document.querySelectorAll(".video-tile");
  document.getElementById("ppCount").textContent = tiles.length;

  tiles.forEach(tile => {
    const id = tile.id.replace("tile-", "");
    const nameEl = tile.querySelector(".tile-name");
    const rawName = nameEl ? nameEl.innerText.trim() : id;
    const isLocal = tile.classList.contains("local");
    const initial = rawName ? rawName[0].toUpperCase() : "?";
    const isMuted = document.getElementById(`mute-${id}`)?.classList.contains("visible");

    const item = document.createElement("div");
    item.className = "pp-item";
    item.innerHTML = `
      <div class="pp-avatar">${initial}</div>
      <div class="pp-info">
        <div class="pp-name">${rawName}</div>
        <div class="pp-status">${isLocal ? "나" : "참가 중"}</div>
      </div>
      <div class="pp-icons">
        ${isMuted ? `<div class="pp-icon muted">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V5a3 3 0 0 0-5.94-.6"/>
          </svg>
        </div>` : ""}
      </div>
    `;
    list.appendChild(item);

}

const ICE_SERVERS = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "stun:stun1.l.google.com:19302" },

// LOBBY
// ──────────────────────────────────────────
async function initPreview() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    const vid = document.getElementById("previewVideo");
    vid.srcObject = stream;
    document.getElementById("noCamMsg").style.display = "none";
    // Store for reuse
    window._previewStream = stream;
  } catch (e) {
    console.log("No media devices:", e);
  }
}

initPreview();

document.getElementById("usernameInput").addEventListener("input", (e) => {
  const v = e.target.value.trim();
  document.getElementById("lobbyAvatar").textContent = v ? v[0].toUpperCase() : "?";
});

async function createRoom() {
  const username = getUsername();
  if (!username) return;

  const res = await fetch(`${RAILWAY_SERVER_URL}/create-room`);
  const { roomId } = await res.json();
  await enterRoom(roomId, username);
}

async function joinRoom() {
  const username = getUsername();
  const code = document.getElementById("roomCodeInput").value.trim().toLowerCase();
  if (!username) return;
  if (!code) { showToast("초대 코드를 입력하세요"); return; }
  await enterRoom(code, username);
}

function getUsername() {
  const v = document.getElementById("usernameInput").value.trim();
  if (!v) { showToast("이름을 입력하세요"); return null; }
  return v;
}

// ──────────────────────────────────────────
// ENTER ROOM
// ──────────────────────────────────────────
async function enterRoom(roomId, username) {
  state.roomId = roomId;
  state.username = username;

  // Get local media
  try {
    state.localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (e) {
    try {
      state.localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e2) {
      state.localStream = new MediaStream();
    }
  }

  // Stop preview stream
  if (window._previewStream) {
    window._previewStream.getTracks().forEach(t => t.stop());
  }

  // Switch UI
  document.getElementById("lobby").style.display = "none";
  document.getElementById("app").style.display = "flex";

  // Update header
  document.getElementById("headerRoomId").textContent = roomId;
  document.getElementById("footerRoomId").textContent = roomId;

  // Add local video tile
  addVideoTile("local", username, state.localStream, true);

  // Start timer
  state.startTime = Date.now();
  setInterval(updateTimer, 1000);

  // Connect socket
  connectSocket(roomId, username);
}

// ──────────────────────────────────────────
// SOCKET + SIGNALING
// ──────────────────────────────────────────
function connectSocket(roomId, username) {
  state.socket = io(RAILWAY_SERVER_URL, { transports: ["websocket", "polling"] });
  const s = state.socket;

  s.emit("join-room", { roomId, username });

  // Existing users -> create offers
  s.on("room-users", async (users) => {
    for (const user of users) {
      await createPeerConnection(user.socketId, user.username, true);
    }
    updateParticipantCount();
  });

  // New user joined -> wait for offer
  s.on("user-joined", ({ socketId, username }) => {
    state.peerUsernames.set(socketId, username);
    createPeerConnection(socketId, username, false);
    showToast(`${username}님이 참가했습니다`);
    updateParticipantCount();
  });

  // Receive offer
  s.on("offer", async ({ from, username, offer }) => {
    state.peerUsernames.set(from, username);
    let pc = state.peers.get(from);
    if (!pc) pc = await createPeerConnection(from, username, false);
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    s.emit("answer", { to: from, answer });
  });

  // Receive answer
  s.on("answer", async ({ from, answer }) => {
    const pc = state.peers.get(from);
    if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer));
  });

  // ICE candidate
  s.on("ice-candidate", ({ from, candidate }) => {
    const pc = state.peers.get(from);
    if (pc && candidate) pc.addIceCandidate(new RTCIceCandidate(candidate));
  });

  // User left
  s.on("user-left", ({ socketId }) => {
    const username = state.peerUsernames.get(socketId) || socketId;
    const pc = state.peers.get(socketId);
    if (pc) pc.close();
    state.peers.delete(socketId);
    state.peerUsernames.delete(socketId);
    removeTile(socketId);
    showToast(`${username}님이 나갔습니다`);
    updateParticipantCount();
    updateGridLayout();
  });

  // Peer media state
  s.on("peer-media-state", ({ socketId, audio }) => {
    const muteEl = document.getElementById(`mute-${socketId}`);
    if (muteEl) muteEl.classList.toggle("visible", !audio);
  });

  // Chat
  s.on("chat-message", ({ socketId, username, message, timestamp }) => {
    appendChat(username, message, timestamp, socketId === s.id);
    if (!state.chatOpen) {
      state.unreadChat++;
      const badge = document.getElementById("chatBadge");
      badge.style.display = "flex";
      badge.textContent = state.unreadChat;
    }
  });
}

// ──────────────────────────────────────────
// PEER CONNECTION
// ──────────────────────────────────────────
async function createPeerConnection(socketId, username, initiator) {
  const pc = new RTCPeerConnection(ICE_SERVERS);
  state.peers.set(socketId, pc);
  state.peerUsernames.set(socketId, username);

  // Add local tracks
  state.localStream.getTracks().forEach(track => pc.addTrack(track, state.localStream));

  // ICE
  pc.onicecandidate = ({ candidate }) => {
    if (candidate) {
      state.socket.emit("ice-candidate", { to: socketId, candidate });
    }
  };

  // Remote stream
  pc.ontrack = ({ streams }) => {
    if (!streams[0]) return;
    const stream = streams[0];
    const existing = document.getElementById(`tile-${socketId}`);

    if (existing) {
      const vid = existing.querySelector("video");
      vid.srcObject = stream;
      vid.play().catch(() => {});

      // 아바타 숨기기 — 여러 이벤트 동시에 처리
      const hideAvatar = () => {
        if (stream.getVideoTracks().length > 0) {
          const av = document.getElementById(`avatar-${socketId}`);
          if (av) av.style.display = "none";
        }
      };
      vid.onloadedmetadata = hideAvatar;
      vid.oncanplay = hideAvatar;
      vid.onplay = hideAvatar;
      if (!vid.paused) hideAvatar();
    } else {
      addVideoTile(socketId, username, stream, false);
      updateGridLayout();
    }
  };

  // Create offer if initiator
  if (initiator) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    state.socket.emit("offer", {
      to: socketId,
      offer: pc.localDescription,
    });
  }

  addVideoTile(socketId, username, null, false);
  updateGridLayout();
  return pc;
}

// ──────────────────────────────────────────
// VIDEO TILES
// ──────────────────────────────────────────
function addVideoTile(id, username, stream, isLocal) {
  if (document.getElementById(`tile-${id}`)) return;

  const grid = document.getElementById("videoGrid");
  const tile = document.createElement("div");
  tile.className = `video-tile${isLocal ? " local" : ""}`;
  tile.id = `tile-${id}`;

  const initial = username ? username[0].toUpperCase() : "?";

  tile.innerHTML = `
    <div class="tile-avatar" id="avatar-${id}">
      <div class="tile-avatar-inner">${initial}</div>
    </div>
    <video id="vid-${id}" autoplay playsinline ${isLocal ? "muted" : ""}></video>
    <div class="tile-overlay">
      <div class="tile-name">
        <div class="muted-icon" id="mute-${id}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V5a3 3 0 0 0-5.94-.6"/>
            <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23M12 19v3M8 22h8"/>
          </svg>
        </div>
        ${username}${isLocal ? " (나)" : ""}
      </div>
    </div>
  `;

  grid.appendChild(tile);

  if (stream) {
    const vid = document.getElementById(`vid-${id}`);
    vid.srcObject = stream;
    vid.play().catch(() => {});

    const hideAvatar = () => {
      if (stream.getVideoTracks().length > 0) {
        const av = document.getElementById(`avatar-${id}`);
        if (av) av.style.display = "none";
      }
    };
    vid.onloadedmetadata = hideAvatar;
    vid.oncanplay = hideAvatar;
    vid.onplay = hideAvatar;
    if (!vid.paused) hideAvatar();
  }

  updateGridLayout();
}

function removeTile(id) {
  const el = document.getElementById(`tile-${id}`);
  if (el) el.remove();
  updateGridLayout();
}

function updateGridLayout() {
  const grid = document.getElementById("videoGrid");
  const tiles = grid.querySelectorAll(".video-tile");
  const count = Math.min(tiles.length, 6);
  grid.className = `count-${count}`;
  updateParticipantCount();
  // 열려 있으면 자동 갱신
  if (filmstripOpen) rebuildFilmstrip();
  if (participantsOpen) rebuildParticipants();
}

// ──────────────────────────────────────────
// CONTROLS
// ──────────────────────────────────────────
function toggleMic() {
  const tracks = state.localStream.getAudioTracks();
  if (tracks.length === 0) { showToast("마이크가 없습니다"); return; }
  state.micEnabled = !state.micEnabled;
  tracks.forEach(t => t.enabled = state.micEnabled);

  const btn = document.getElementById("micBtn");
  const label = document.getElementById("micLabel");

  btn.classList.toggle("off", !state.micEnabled);
  label.textContent = state.micEnabled ? "마이크" : "마이크 꺼짐";

  // Update icon
  const icon = document.getElementById("micIcon");
  if (!state.micEnabled) {
    icon.innerHTML = `
      <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2"/>
      <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V5a3 3 0 0 0-5.94-.6" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23M12 19v3M8 22h8" stroke="currentColor" stroke-width="2" fill="none"/>
    `;
  } else {
    icon.innerHTML = `
      <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3M8 22h8" stroke="currentColor" stroke-width="2" fill="none"/>
    `;
  }

  // Notify peers
  if (state.socket) {
    state.socket.emit("media-state", {
      roomId: state.roomId,
      audio: state.micEnabled,
      video: state.camEnabled,
    });
  }

  // Update local mute icon
  const muteEl = document.getElementById("mute-local");
  if (muteEl) muteEl.classList.toggle("visible", !state.micEnabled);
}

function toggleCamera() {
  const tracks = state.localStream.getVideoTracks();
  if (tracks.length === 0) { showToast("카메라가 없습니다"); return; }
  state.camEnabled = !state.camEnabled;
  tracks.forEach(t => t.enabled = state.camEnabled);

  const btn = document.getElementById("camBtn");
  const label = document.getElementById("camLabel");
  btn.classList.toggle("off", !state.camEnabled);
  label.textContent = state.camEnabled ? "카메라" : "카메라 꺼짐";

  const avatar = document.getElementById("avatar-local");
  if (avatar) avatar.style.display = state.camEnabled ? "none" : "flex";
}

async function toggleScreenShare() {
  const btn = document.getElementById("screenBtn");
  const banner = document.getElementById("screenShareBanner");

  if (!state.screenSharing) {
    try {
      state.screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
      const screenTrack = state.screenStream.getVideoTracks()[0];

      // Replace video track in all peer connections
      state.peers.forEach(pc => {
        const sender = pc.getSenders().find(s => s.track && s.track.kind === "video");
        if (sender) sender.replaceTrack(screenTrack);
      });

      // Update local preview
      const localVid = document.getElementById("vid-local");
      if (localVid) {
        const ms = new MediaStream([screenTrack, ...state.localStream.getAudioTracks()]);
        localVid.srcObject = ms;
      }

      state.screenSharing = true;
      btn.classList.add("active");
      banner.classList.add("active");

      screenTrack.onended = () => stopScreenShare();
    } catch (e) {
      showToast("화면 공유를 취소했습니다");
    }
  } else {
    stopScreenShare();
  }
}

function stopScreenShare() {
  if (state.screenStream) {
    state.screenStream.getTracks().forEach(t => t.stop());
    state.screenStream = null;
  }

  const camTrack = state.localStream.getVideoTracks()[0];
  if (camTrack) {
    state.peers.forEach(pc => {
      const sender = pc.getSenders().find(s => s.track && s.track.kind === "video");
      if (sender) sender.replaceTrack(camTrack);
    });
  }

  const localVid = document.getElementById("vid-local");
  if (localVid) localVid.srcObject = state.localStream;

  state.screenSharing = false;
  document.getElementById("screenBtn").classList.remove("active");
  document.getElementById("screenShareBanner").classList.remove("active");
}

function endCall() {
  if (state.localStream) state.localStream.getTracks().forEach(t => t.stop());
  if (state.screenStream) state.screenStream.getTracks().forEach(t => t.stop());
  state.peers.forEach(pc => pc.close());
  if (state.socket) state.socket.disconnect();
  location.reload();
}

// ──────────────────────────────────────────
// CHAT
// ──────────────────────────────────────────
function toggleChat() {
  state.chatOpen = !state.chatOpen;
  document.getElementById("chatPanel").classList.toggle("open", state.chatOpen);
  if (state.chatOpen) {
    state.unreadChat = 0;
    const badge = document.getElementById("chatBadge");
    badge.style.display = "none";
    document.getElementById("chatInput").focus();
  }
}

function sendChat() {
  const input = document.getElementById("chatInput");
  const msg = input.value.trim();
  if (!msg || !state.socket) return;
  state.socket.emit("chat-message", { roomId: state.roomId, message: msg });
  input.value = "";
}

function chatKeydown(e) {
  if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    sendChat();
  }
}

function appendChat(username, message, timestamp, isMe) {
  const container = document.getElementById("chatMessages");
  const time = new Date(timestamp).toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });

  const div = document.createElement("div");
  div.className = "chat-msg";
  div.innerHTML = `
    <div class="chat-msg-header">
      <span class="chat-msg-name" style="${isMe ? "color:var(--accent-green)" : ""}">${username}</span>
      <span class="chat-msg-time">${time}</span>
    </div>
    <div class="chat-msg-body">${escapeHtml(message)}</div>
  `;

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ──────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────
function copyRoomId() {
  navigator.clipboard.writeText(state.roomId).then(() => {
    showToast(`코드 복사됨: ${state.roomId}`);
  });
}

function updateParticipantCount() {
  const tiles = document.querySelectorAll(".video-tile");
  document.getElementById("participantNum").textContent = tiles.length;
}

function updateTimer() {
  if (!state.startTime) return;
  const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  const m = Math.floor(elapsed / 60).toString().padStart(2, "0");
  const s = (elapsed % 60).toString().padStart(2, "0");
  document.getElementById("headerTime").textContent = `${m}:${s}`;
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
}
</script>
